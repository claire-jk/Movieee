name: Daily Cinema Crawler

on:
  schedule:
    # 每天台灣時間早上 6:00 執行 (UTC 22:00)
    - cron: '0 22 * * *'
  workflow_dispatch: # 允許手動從 GitHub 介面執行

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Browsers
        run: npx playwright install chromium --with-deps

      - name: Create Service Account Key
        run: |
          echo '${{ secrets.FIREBASE_CRAWLER_KEY }}' > serviceAccount.json

      - name: Run Crawler
        run: npm start crawler
        env:
          NODE_ENV: production

      # 錯誤監控：如果執行失敗，發送通知 (可選)
      - name: Check Status
        if: failure()
        run: echo "爬蟲執行失敗，請檢查 Log！"